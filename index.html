<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Emergency Triage Assistant</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="hero">
    <div class="hero-content">
        <header>
            <div class="eyebrow">Real‑time AI triage · 24/7</div>
            <h1>AI Emergency Triage Assistant</h1>
            <p>Helping healthcare teams prioritize patients in real time using AI analysis of symptoms and vital signs.</p>
        </header>

        <div class="hero-metrics">
            <div class="metric-chip">
                <span class="metric-label">Average triage time</span>
                <span class="metric-value">↓ 38%</span>
            </div>
            <div class="metric-chip">
                <span class="metric-label">Critical alerts</span>
                <span class="metric-value">Instant</span>
            </div>
        </div>

        <div class="buttons">
            <a href="triage.html">
                <button class="primary">Start Patient Triage</button>
            </a>

            <a href="dashboard.html">
                <button class="secondary">View Dashboard</button>
            </a>
        </div>
    </div>

    <div class="hero-illustration">
        <img
            src="e0f39857c4d032e853d8f9bd4aa75357.jpg"
            alt="Illustration of people collaborating around a large data dashboard"
        >
    </div>
</div>

</body>
</html>
